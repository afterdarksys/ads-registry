apiVersion: kubelet.config.k8s.io/v1
kind: CredentialProviderConfig
providers:
  # ADS Container Registry Credential Provider
  - name: ads-registry-credential-provider
    matchImages:
      - "apps.afterdarksys.com:5005"
      - "apps.afterdarksys.com:5005/*"
      - "*.apps.afterdarksys.com:5005"
      - "*.apps.afterdarksys.com:5005/*"
    defaultCacheDuration: "5m"
    apiVersion: credentialprovider.kubelet.k8s.io/v1
    args:
      - --config
      - /etc/kubernetes/credential-provider-config.json
    env:
      - name: REGISTRY_URL
        value: "apps.afterdarksys.com:5005"
      - name: TOKEN_URL
        value: "https://apps.afterdarksys.com:5005/api/v2/k8s/token"
      - name: TOKEN_FILE
        value: "/var/lib/kubelet/registry-token"
      - name: CACHE_DURATION
        value: "5m"
      - name: DEBUG
        value: "0"
