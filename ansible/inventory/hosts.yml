---
all:
  children:
    registry_servers:
      hosts:
        apps.afterdarksys.com:
          ansible_host: apps.afterdarksys.com
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

          # Registry configuration
          registry_install_dir: /opt/ads-registry
          registry_data_dir: /opt/ads-registry/data
          registry_config_file: /opt/ads-registry/config.json

          # Service configuration
          registry_service_name: ads-registry
          registry_http_port: 5005
          registry_https_port: 5006

          # TLS configuration
          registry_tls_enabled: true
          registry_tls_cert: /root/letsgoout/traefik/certs/apps.afterdarksys.com.crt
          registry_tls_key: /root/letsgoout/traefik/certs/apps.afterdarksys.com.key

          # Database configuration
          registry_db_host: 127.0.0.1
          registry_db_port: 5434
          registry_db_name: ads_registry
          registry_db_user: ads_registry

          # Redis configuration
          registry_redis_enabled: false
          registry_redis_host: 127.0.0.1
          registry_redis_port: 6379
